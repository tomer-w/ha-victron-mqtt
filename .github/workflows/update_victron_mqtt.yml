name: Update victron_mqtt Dependency and Translations

on:
  schedule:
    - cron: '0 4 * * *' # Runs daily at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-victron-mqtt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Get latest victron_mqtt release
        id: get_release
        run: |
          latest=$(curl -s https://pypi.org/pypi/victron_mqtt/json | jq -r .info.version)
          echo "latest_version=$latest" >> $GITHUB_OUTPUT
          
          # Get release notes from GitHub (GitHub tags use 'v' prefix)
          release_notes=$(curl -s "https://api.github.com/repos/tomer-w/victron_mqtt/releases/tags/v$latest" | jq -r '.body // "No release notes available"')
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$release_notes" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if update is needed
        id: check_update
        run: |
          # Compare against the vendored lib version by checking the wheel we'd download
          latest="${{ steps.get_release.outputs.latest_version }}"
          # Check if the lib/ directory already has this version by looking at a marker file
          if [ -f "custom_components/victron_mqtt/_vendor/__init__.py" ]; then
            current=$(python3 -c "import re; m = re.search(r'VICTRON_MQTT_VERSION\s*=\s*\"(.+?)\"', open('custom_components/victron_mqtt/_vendor/__init__.py').read()); print(m.group(1) if m else 'unknown')")
          else
            current="unknown"
          fi
          echo "Current: $current, Latest: $latest"
          if [ "$current" = "$latest" ]; then
            echo "No update needed."
            echo "update_needed=false" >> $GITHUB_OUTPUT
          else
            echo "Update needed."
            echo "update_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Download and vendor victron_mqtt library
        if: steps.check_update.outputs.update_needed == 'true'
        run: |
          set -e
          latest="${{ steps.get_release.outputs.latest_version }}"

          # Download the wheel from PyPI
          pip download "victron_mqtt==$latest" --no-deps -d /tmp/victron_wheel

          # Extract the wheel (it's a zip file)
          wheel_file=$(ls /tmp/victron_wheel/victron_mqtt-*.whl)
          unzip -o "$wheel_file" "victron_mqtt/*" -d /tmp/victron_extracted

          # Replace the vendored lib/ directory
          rm -rf custom_components/victron_mqtt/_vendor/victron_mqtt
          cp -r /tmp/victron_extracted/victron_mqtt custom_components/victron_mqtt/_vendor/victron_mqtt

          # Remove __pycache__, py.typed, and utils/ (not needed in integration context)
          find custom_components/victron_mqtt/_vendor/victron_mqtt -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          rm -f custom_components/victron_mqtt/_vendor/victron_mqtt/py.typed
          rm -rf custom_components/victron_mqtt/_vendor/victron_mqtt/utils

          # Write version constant to _vendor/__init__.py
          cat > custom_components/victron_mqtt/_vendor/__init__.py << PYEOF
"""Vendored third-party packages."""

VICTRON_MQTT_VERSION = "$latest"
PYEOF

          # Cleanup
          rm -rf /tmp/victron_wheel /tmp/victron_extracted

      - name: Download victron_mqtt release package from PyPI
        if: steps.check_update.outputs.update_needed == 'true'
        run: |
          latest="${{ steps.get_release.outputs.latest_version }}"
          sdist_url=$(curl -s "https://pypi.org/pypi/victron_mqtt/$latest/json" | jq -r '.urls[] | select(.packagetype == "sdist") | .url')
          curl -L -o "victron_mqtt-$latest.tar.gz" "$sdist_url"

      - name: Extract victron_mqtt.json from release package
        if: steps.check_update.outputs.update_needed == 'true'
        run: |
          set -e
          latest="${{ steps.get_release.outputs.latest_version }}"
          tar -xzf victron_mqtt-$latest.tar.gz victron_mqtt-$latest/victron_mqtt.json
          mv victron_mqtt-$latest/victron_mqtt.json victron_mqtt.json
          rm -rf victron_mqtt-$latest.tar.gz victron_mqtt-$latest/

      - name: Merge topics into en.json
        if: steps.check_update.outputs.update_needed == 'true'
        run: |
          python3 .github/scripts/merge_topics.py

      - name: Create Pull Request
        if: steps.check_update.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update/victron-mqtt-${{ steps.get_release.outputs.latest_version }}
          delete-branch: true
          title: "Update victron_mqtt to ${{ steps.get_release.outputs.latest_version }}"
          body: |
            ## Changes in victron_mqtt ${{ steps.get_release.outputs.latest_version }}
            
            ${{ steps.get_release.outputs.release_notes }}
          commit-message: |
            Update victron_mqtt to ${{ steps.get_release.outputs.latest_version }}
            
            ${{ steps.get_release.outputs.release_notes }}
          base: main
          labels: "dependencies"
